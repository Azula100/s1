<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8">
<title>GLB VR Loader</title>
<style>
    body { margin:0; overflow:hidden; }
    canvas { display:block; }
</style>
<script type="importmap">
{
"imports":{
"three":"https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
"three/addons/":"https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
}
}
</script>
</head>
<body>
<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { VRButton } from "three/addons/webxr/VRButton.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202025);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
// VR-гүй үед камерын байрлал
camera.position.set(0, 1.6, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
// VR-д шалны түвшинг мэдрүүлэх хамгийн чухал хэсэг
renderer.xr.setReferenceSpaceType('local-floor'); 
document.body.appendChild(renderer.domElement);

document.body.appendChild(VRButton.createButton(renderer));

// Гэрэлтүүлэг
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444));
const dirLight = new THREE.DirectionalLight(0xffffff);
dirLight.position.set(3, 10, 10);
scene.add(dirLight);

// Кабель үүсгэх функцийг сайжруулав (Төв цэг тооцоолох)
function createCable(obj1, obj2, color = 0xffff00) {
    if (!obj1 || !obj2) return;

    const start = new THREE.Vector3();
    const end = new THREE.Vector3();

    // Объектуудын төв цэгийг Дэлхийн координатаар авах
    new THREE.Box3().setFromObject(obj1).getCenter(start);
    new THREE.Box3().setFromObject(obj2).getCenter(end);

    const distance = start.distanceTo(end);
    const geometry = new THREE.CylinderGeometry(0.01, 0.01, distance, 8);
    const material = new THREE.MeshStandardMaterial({ color: color });
    const cable = new THREE.Mesh(geometry, material);

    const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
    cable.position.copy(midpoint);
    cable.lookAt(end);
    cable.rotateX(Math.PI / 2); 

    scene.add(cable);
}

const loader = new GLTFLoader();
loader.load(
  "./lab4.glb",
  function (gltf) {
    const model = gltf.scene;

    // Моделийг шалан дээр яг тааруулж байрлуулах
    const box = new THREE.Box3().setFromObject(model);
    const center = new THREE.Vector3();
    box.getCenter(center);

    // Моделийн доод ирмэгийг Y=0 (шал) болгож, хэрэглэгчийн урд байрлуулах
    model.position.x = -center.x;
    model.position.y = -box.min.y; 
    model.position.z = -center.z - 2; 

    scene.add(model);

    // Объектуудыг нэрээр нь хайж холбох
    // Тэмдэглэл: lab4.glb доторх нэрс нь router, switch гэх мэт байх ёстой
    const router = model.getObjectByName("router");
    const switch1 = model.getObjectByName("switch");
    const pc1 = model.getObjectByName("komMouseKey1");
    const pc2 = model.getObjectByName("komMouseKey2");

    if(router && switch1) createCable(router, switch1, 0xff0000);
    if(switch1 && pc1) createCable(switch1, pc1, 0x00ff00);
    if(switch1 && pc2) createCable(switch1, pc2, 0x00ff00);

    console.log('Модель болон кабель амжилттай байрлалаа');
  }
);

renderer.setAnimationLoop(() => {
  renderer.render(scene, camera);
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
