<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8">
<title>GLB VR & Orbit Controls</title>
<style>
    body { margin:0; overflow:hidden; }
    canvas { display:block; }
</style>
<script type="importmap">
{
"imports":{
"three":"https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
"three/addons/":"https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
}
}
</script>
</head>
<body>
<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { VRButton } from "three/addons/webxr/VRButton.js";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202025);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.6, 5); // Камерын эхлэх байрлал

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.xr.setReferenceSpaceType('local-floor'); 
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// Orbit Controls тохиргоо
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Гэрэл
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444));
const dirLight = new THREE.DirectionalLight(0xffffff);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

// Кабель үүсгэх функц
function createCable(obj1, obj2, color = 0xffff00) {
    if (!obj1 || !obj2) return;
    const start = new THREE.Vector3();
    const end = new THREE.Vector3();
    new THREE.Box3().setFromObject(obj1).getCenter(start);
    new THREE.Box3().setFromObject(obj2).getCenter(end);

    const distance = start.distanceTo(end);
    const geometry = new THREE.CylinderGeometry(0.01, 0.01, distance, 8);
    const material = new THREE.MeshStandardMaterial({ color: color });
    const cable = new THREE.Mesh(geometry, material);

    cable.position.copy(new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5));
    cable.lookAt(end);
    cable.rotateX(Math.PI / 2); 
    scene.add(cable);
}

const loader = new GLTFLoader();
loader.load("./lab4.glb", function (gltf) {
    const model = gltf.scene;
    const box = new THREE.Box3().setFromObject(model);
    const center = new THREE.Vector3();
    box.getCenter(center);

    model.position.x = -center.x;
    model.position.y = -box.min.y; 
    model.position.z = -center.z; 

    scene.add(model);

    // Кабель холбох хэсэг
    const router = model.getObjectByName("router");
    const switch1 = model.getObjectByName("switch");
    if(router && switch1) createCable(router, switch1, 0xff0000);
});

renderer.setAnimationLoop(() => {
  controls.update(); // Хулганы хөдөлгөөнийг мэдэрнэ
  renderer.render(scene, camera);
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
